<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SandCastle Wars</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1209;
      color: #e8d5a3;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 1.8rem;
      letter-spacing: 0.15em;
      color: #f5c842;
      text-shadow: 0 0 12px #c49a00;
    }

    #status-bar {
      display: flex;
      gap: 32px;
      font-size: 0.85rem;
      background: #2b1f0a;
      border: 1px solid #5a3e1b;
      border-radius: 6px;
      padding: 10px 20px;
    }

    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-label { color: #8a7350; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .stat-value { font-size: 1.1rem; font-weight: bold; color: #f5c842; }

    #canvas-wrap {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #5a3e1b;
      border-radius: 4px;
      image-rendering: pixelated;
    }

    /* Zone labels overlaid on canvas */
    #zone-labels {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
    }
    .zone-label {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 6px;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      opacity: 0.45;
    }
    #zone-p1 { color: #6bc5f8; }
    #zone-p2 { color: #f87171; }

    #weather-bar {
      font-size: 0.8rem;
      color: #8a7350;
      background: #2b1f0a;
      border: 1px solid #3a2a0e;
      border-radius: 6px;
      padding: 8px 20px;
      letter-spacing: 0.05em;
    }

    #legend {
      display: flex;
      gap: 16px;
      font-size: 0.75rem;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch {
      width: 14px; height: 14px;
      border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #error-msg {
      color: #f87171;
      font-size: 0.8rem;
      min-height: 1.2em;
    }

    /* ── God Mode ─────────────────────────────────────────────────── */
    #god-toggle {
      margin: 10px auto 0;
      display: block;
      padding: 6px 18px;
      background: #2b1f0a;
      border: 1px solid #5a3e1b;
      color: #e8d5a3;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #god-toggle.active {
      background: #f5c842;
      color: #1a1000;
      border-color: #f5c842;
      font-weight: bold;
    }
    #god-panel {
      display: none;
      margin: 10px auto;
      max-width: 620px;
      background: #1a1000;
      border: 1px solid #5a3e1b;
      border-radius: 6px;
      padding: 14px 18px;
      font-family: 'Courier New', monospace;
      color: #e8d5a3;
      font-size: 12px;
    }
    #god-panel.visible { display: block; }
    .god-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .god-label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #a08050;
      width: 80px;
      flex-shrink: 0;
    }
    .god-btn {
      padding: 4px 12px;
      background: #2b1f0a;
      border: 1px solid #5a3e1b;
      color: #e8d5a3;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    .god-btn.selected {
      background: #f5c842;
      color: #1a1000;
      border-color: #f5c842;
      font-weight: bold;
    }
    .god-btn.dimmed {
      opacity: 0.35;
      cursor: default;
    }
    #god-tick-btn {
      margin-top: 4px;
      padding: 6px 20px;
      background: #3a1f00;
      border: 1px solid #c0602a;
      color: #f5a842;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #god-tick-btn:hover { background: #5a2f00; }
    #god-status {
      margin-top: 8px;
      font-size: 11px;
      color: #a08050;
      min-height: 16px;
    }
    #god-status.ok  { color: #7fc97f; }
    #god-status.err { color: #e05050; }
  </style>
</head>
<body>

<h1>&#127958; SandCastle Wars</h1>

<div id="status-bar">
  <div class="stat"><span class="stat-label">Tick</span><span class="stat-value" id="stat-tick">—</span></div>
  <div class="stat"><span class="stat-label">P1 Blocks</span><span class="stat-value" id="stat-p1">—</span></div>
  <div class="stat"><span class="stat-label">P2 Blocks</span><span class="stat-value" id="stat-p2">—</span></div>
  <div class="stat"><span class="stat-label">Rain</span><span class="stat-value" id="stat-rain">—</span></div>
  <div class="stat"><span class="stat-label">Wind</span><span class="stat-value" id="stat-wind">—</span></div>
</div>

<div id="canvas-wrap">
  <canvas id="grid" width="600" height="600"></canvas>
  <div id="zone-labels">
    <div class="zone-label" id="zone-p1">PLAYER 1</div>
    <div class="zone-label" id="zone-p2">PLAYER 2</div>
  </div>
</div>

<div id="weather-bar" id="weather-bar">Fetching weather…</div>

<div id="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#c8a96e"></div>dry sand</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#7fb3c8"></div>wet sand</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#d4af37"></div>packed sand</div>
</div>

<div id="error-msg"></div>

<button id="god-toggle">⚡ God Mode</button>

<div id="god-panel">
  <div class="god-row">
    <span class="god-label">Player</span>
    <button class="god-btn selected" data-god-player="player1">Player 1</button>
    <button class="god-btn"          data-god-player="player2">Player 2</button>
  </div>
  <div class="god-row">
    <span class="god-label">Action</span>
    <button class="god-btn selected" data-god-action="PLACE">PLACE</button>
    <button class="god-btn"          data-god-action="REMOVE">REMOVE</button>
    <button class="god-btn"          data-god-action="REINFORCE">REINFORCE</button>
  </div>
  <div class="god-row" id="god-type-row">
    <span class="god-label">Block</span>
    <button class="god-btn selected" data-god-type="packed_sand">packed_sand</button>
    <button class="god-btn"          data-god-type="wet_sand">wet_sand</button>
    <button class="god-btn"          data-god-type="dry_sand">dry_sand</button>
  </div>
  <div class="god-row">
    <span class="god-label">Tick</span>
    <button id="god-tick-btn">⚡ Trigger Tick</button>
  </div>
  <div id="god-status">Click a cell on the grid to make a move.</div>
</div>

<script>
  // ---------------------------------------------------------------------------
  // Config
  // ---------------------------------------------------------------------------
  const API_BASE   = '';
  const CELL_SIZE  = 30;
  const GRID_W     = 20;
  const GRID_H     = 20;
  const POLL_MS    = 5000;

  // Block colours: base hue, then health-shaded below
  const BLOCK_COLORS = {
    dry_sand:    '#c8a96e',
    wet_sand:    '#7fb3c8',
    packed_sand: '#d4af37',
  };

  // ---------------------------------------------------------------------------
  // Canvas setup
  // ---------------------------------------------------------------------------
  const canvas = document.getElementById('grid');
  const ctx    = canvas.getContext('2d');

  function healthAlpha(health) {
    // health 1–100 → opacity 0.35–1.0
    return 0.35 + (health / 100) * 0.65;
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `${r},${g},${b}`;
  }

  function drawGrid(cells) {
    // Background
    ctx.fillStyle = '#c4a46a22';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= GRID_W; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL_SIZE, 0);
      ctx.lineTo(x * CELL_SIZE, GRID_H * CELL_SIZE);
      ctx.stroke();
    }
    for (let y = 0; y <= GRID_H; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL_SIZE);
      ctx.lineTo(GRID_W * CELL_SIZE, y * CELL_SIZE);
      ctx.stroke();
    }

    // Zone divider
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(10 * CELL_SIZE, 0);
    ctx.lineTo(10 * CELL_SIZE, GRID_H * CELL_SIZE);
    ctx.stroke();
    ctx.setLineDash([]);

    // Cells
    for (const cell of cells) {
      const baseColor = BLOCK_COLORS[cell.type] ?? '#888';
      const alpha     = healthAlpha(Math.max(1, cell.health));
      const rgb       = hexToRgb(baseColor);

      // Fill
      ctx.fillStyle = `rgba(${rgb},${alpha.toFixed(2)})`;
      ctx.fillRect(
        cell.x * CELL_SIZE + 1,
        cell.y * CELL_SIZE + 1,
        CELL_SIZE - 2,
        CELL_SIZE - 2
      );

      // Owner tint border
      ctx.strokeStyle = cell.owner === 'player1'
        ? `rgba(107,197,248,${(alpha * 0.7).toFixed(2)})`
        : `rgba(248,113,113,${(alpha * 0.7).toFixed(2)})`;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(
        cell.x * CELL_SIZE + 1.5,
        cell.y * CELL_SIZE + 1.5,
        CELL_SIZE - 3,
        CELL_SIZE - 3
      );

      // Health text for blocks below 50%
      if (cell.health < 50) {
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(cell.health, cell.x * CELL_SIZE + CELL_SIZE / 2, cell.y * CELL_SIZE + CELL_SIZE / 2);
      }
    }
  }

  // ---------------------------------------------------------------------------
  // State polling
  // ---------------------------------------------------------------------------
  let lastTick = -1;

  async function poll() {
    try {
      const res = await fetch(`${API_BASE}/state`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const state = await res.json();

      drawGrid(state.cells);

      // Status bar
      document.getElementById('stat-tick').textContent = state.tick;

      const p1 = state.cells.filter(c => c.owner === 'player1').length;
      const p2 = state.cells.filter(c => c.owner === 'player2').length;
      document.getElementById('stat-p1').textContent = p1;
      document.getElementById('stat-p2').textContent = p2;

      const w = state.weather;
      document.getElementById('stat-rain').textContent = `${w.rain_mm} mm`;
      document.getElementById('stat-wind').textContent = `${w.wind_speed_kph} kph ${w.wind_direction}`;

      document.getElementById('weather-bar').textContent =
        `Weather: ${w.rain_mm} mm rain · ${w.wind_speed_kph} kph from ${w.wind_direction}`;

      document.getElementById('error-msg').textContent = '';
      lastTick = state.tick;
    } catch (err) {
      document.getElementById('error-msg').textContent = `Could not reach API: ${err.message}`;
    }
  }

  poll();
  setInterval(poll, POLL_MS);

  // ── God Mode ──────────────────────────────────────────────────────
  let godMode = false;
  let godPlayer = 'player1';
  let godAction = 'PLACE';
  let godBlockType = 'packed_sand';
  let godHoverCell = null; // {x, y} or null

  const godToggle  = document.getElementById('god-toggle');
  const godPanel   = document.getElementById('god-panel');
  const godStatus  = document.getElementById('god-status');
  const godTypeRow = document.getElementById('god-type-row');

  // Toggle panel visibility
  godToggle.addEventListener('click', () => {
    godMode = !godMode;
    godToggle.classList.toggle('active', godMode);
    godPanel.classList.toggle('visible', godMode);
    if (!godMode) godHoverCell = null;
  });

  // Generic button-group selector
  function bindGodButtons(attr, onSelect) {
    document.querySelectorAll(`[${attr}]`).forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll(`[${attr}]`).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        onSelect(btn.getAttribute(attr));
      });
    });
  }

  bindGodButtons('data-god-player', v => { godPlayer = v; });
  bindGodButtons('data-god-action', v => {
    godAction = v;
    // Dim block-type buttons when action is not PLACE
    const needsType = v === 'PLACE';
    document.querySelectorAll('[data-god-type]').forEach(b =>
      b.classList.toggle('dimmed', !needsType)
    );
    godTypeRow.style.opacity = needsType ? '1' : '0.4';
  });
  bindGodButtons('data-god-type', v => { godBlockType = v; });

  // Canvas hover — draw highlight cell when in god mode
  canvas.addEventListener('mousemove', e => {
    if (!godMode) { godHoverCell = null; return; }
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    godHoverCell = {
      x: Math.floor((e.clientX - rect.left) * scaleX / CELL_SIZE),
      y: Math.floor((e.clientY - rect.top)  * scaleY / CELL_SIZE),
    };
  });
  canvas.addEventListener('mouseleave', () => { godHoverCell = null; });

  // Hook into the render loop: after drawing, overlay the hover cell
  function drawGodOverlay() {
    if (!godMode || !godHoverCell) return;
    const ctx = canvas.getContext('2d');
    const { x, y } = godHoverCell;
    ctx.save();
    ctx.fillStyle = 'rgba(245, 200, 66, 0.25)';
    ctx.strokeStyle = '#f5c842';
    ctx.lineWidth = 2;
    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
    ctx.strokeRect(x * CELL_SIZE + 1, y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
    ctx.restore();
  }

  // Canvas click — submit god move
  canvas.addEventListener('click', async e => {
    if (!godMode) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = Math.floor((e.clientX - rect.left) * scaleX / CELL_SIZE);
    const y = Math.floor((e.clientY - rect.top)  * scaleY / CELL_SIZE);

    const body = { player: godPlayer, action: godAction, x, y };
    if (godAction === 'PLACE') body.type = godBlockType;

    godStatus.textContent = `Sending ${godAction} at (${x},${y}) for ${godPlayer}…`;
    godStatus.className = '';

    try {
      const res = await fetch(`${API_BASE}/god/move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (res.ok) {
        const typeStr = godAction === 'PLACE' ? ` ${godBlockType}` : '';
        godStatus.textContent = `✓ ${godAction}${typeStr} at (${x},${y}) for ${godPlayer} — actions used: ${data.actionsThisTick}/12`;
        godStatus.className = 'ok';
      } else {
        godStatus.textContent = `✗ ${data.error}`;
        godStatus.className = 'err';
      }
    } catch (err) {
      godStatus.textContent = `✗ Network error: ${err.message}`;
      godStatus.className = 'err';
    }

    await poll();
    drawGodOverlay();
  });

  // Trigger tick button
  document.getElementById('god-tick-btn').addEventListener('click', async () => {
    godStatus.textContent = 'Triggering tick…';
    godStatus.className = '';
    try {
      const res = await fetch(`${API_BASE}/god/tick`, { method: 'POST' });
      const data = await res.json();
      if (res.ok) {
        godStatus.textContent = `✓ Tick ${data.tick} — rain: ${data.weather.rain_mm}mm, wind: ${data.weather.wind_speed_kph}kph ${data.weather.wind_direction}, cells: ${data.cellsRemaining}`;
        godStatus.className = 'ok';
      } else {
        godStatus.textContent = `✗ ${data.error}`;
        godStatus.className = 'err';
      }
    } catch (err) {
      godStatus.textContent = `✗ Network error: ${err.message}`;
      godStatus.className = 'err';
    }
    await poll();
    drawGodOverlay();
  });

  // Re-draw overlay after each poll for the auto-polling interval
  const godOverlayInterval = setInterval(drawGodOverlay, 200);

</script>
</body>
</html>
