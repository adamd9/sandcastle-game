name: Auto-merge Agent PRs

on:
  pull_request:
    types: [opened, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Debug and check PR author
        id: author-check
        run: |
          LOGIN="${{ github.event.pull_request.user.login }}"
          echo "PR author login: '$LOGIN'"
          echo "PR author type: '${{ github.event.pull_request.user.type }}'"
          # Match Copilot, copilot-swe-agent, app/copilot-swe-agent, etc.
          if [[ "$LOGIN" == *"opilot"* ]] || [[ "$LOGIN" == *"copilot"* ]]; then
            echo "is_copilot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_copilot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if not a Copilot PR
        if: steps.author-check.outputs.is_copilot != 'true'
        run: |
          echo "Not a Copilot agent PR (login: ${{ github.event.pull_request.user.login }}), exiting."
          exit 0

      - uses: actions/checkout@v4
        if: steps.author-check.outputs.is_copilot == 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        if: steps.author-check.outputs.is_copilot == 'true'
        with:
          node-version: '22'

      - name: Run tests
        # Skip on opened+draft: we just mark ready and let ready_for_review re-trigger
        if: steps.author-check.outputs.is_copilot == 'true' && (github.event.action == 'ready_for_review' || github.event.pull_request.draft == false)
        run: cd api && npm ci && npm test

      - name: Mark PR ready for review (if draft on opened event)
        # Use COPILOT_TOKEN (a PAT) so GitHub fires the ready_for_review event,
        # which will re-trigger this workflow to run the full test + merge flow.
        # GITHUB_TOKEN actions do NOT fire new workflow events (GitHub prevents loops).
        if: steps.author-check.outputs.is_copilot == 'true' && github.event.action == 'opened' && github.event.pull_request.draft == true
        run: gh pr ready ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}

      - name: Auto-merge PR
        # Only merge on ready_for_review event, or when PR was opened as non-draft
        if: steps.author-check.outputs.is_copilot == 'true' && (github.event.action == 'ready_for_review' || github.event.pull_request.draft == false)
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close linked issues
        if: steps.author-check.outputs.is_copilot == 'true' && (github.event.action == 'ready_for_review' || github.event.pull_request.draft == false)
        run: |
          ISSUES=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[].number')
          for ISSUE in $ISSUES; do
            gh issue close "$ISSUE" \
              --comment "✅ Implemented and merged via PR #${{ github.event.pull_request.number }}." \
              --repo ${{ github.repository }}
            echo "Closed issue #$ISSUE"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
