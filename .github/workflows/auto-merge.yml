name: Auto-merge Agent PRs

on:
  pull_request:
    types: [opened, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-merge:
    # Accept any login variant for the Copilot SWE agent bot
    if: >-
      contains(github.event.pull_request.user.login, 'opilot') ||
      contains(github.event.pull_request.user.login, 'copilot')
    runs-on: ubuntu-latest
    steps:
      - name: Debug PR author
        run: echo "PR author login is '${{ github.event.pull_request.user.login }}' type '${{ github.event.pull_request.user.type }}'"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: cd api && npm ci && npm test

      - name: Mark PR ready for review (if draft)
        run: gh pr ready ${{ github.event.pull_request.number }} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close linked issues
        run: |
          ISSUES=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[].number')
          for ISSUE in $ISSUES; do
            gh issue close "$ISSUE" \
              --comment "✅ Implemented and merged via PR #${{ github.event.pull_request.number }}." \
              --repo ${{ github.repository }}
            echo "Closed issue #$ISSUE"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
