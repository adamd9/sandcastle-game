name: Auto-merge Agent PRs

on:
  pull_request:
    types: [labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-merge:
    if: github.event.label.name == 'agent-pr'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: cd api && npm ci && npm test

      - name: Auto-merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
