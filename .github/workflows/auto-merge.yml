name: Auto-merge Agent PRs

on:
  pull_request:
    # This workflow runs tests and merges. It triggers on ready_for_review
    # events (fired by the mark-pr-ready workflow via PAT) which have
    # triggering_actor=adamd9, bypassing the GitHub approval gate for bots.
    types: [ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-merge:
    # Only run for non-draft PRs (ready_for_review implies non-draft)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Debug and check PR author
        id: author-check
        run: |
          LOGIN="${{ github.event.pull_request.user.login }}"
          echo "PR author login: '$LOGIN'"
          echo "PR author type: '${{ github.event.pull_request.user.type }}'"
          # Match Copilot, copilot-swe-agent, app/copilot-swe-agent, etc.
          if [[ "$LOGIN" == *"opilot"* ]] || [[ "$LOGIN" == *"copilot"* ]]; then
            echo "is_copilot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_copilot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if not a Copilot PR
        if: steps.author-check.outputs.is_copilot != 'true'
        run: |
          echo "Not a Copilot agent PR (login: ${{ github.event.pull_request.user.login }}), exiting."
          exit 0

      - uses: actions/checkout@v4
        if: steps.author-check.outputs.is_copilot == 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        if: steps.author-check.outputs.is_copilot == 'true'
        with:
          node-version: '22'

      - name: Run tests
        if: steps.author-check.outputs.is_copilot == 'true'
        run: cd api && npm ci && npm test

      - name: Check PR has actual changes
        if: steps.author-check.outputs.is_copilot == 'true'
        id: change-check
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          FILES=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json files --jq '.files | length')
          echo "PR title: $TITLE"
          echo "Changed files: $FILES"

          if echo "$TITLE" | grep -qi "\[WIP\]"; then
            echo "PR still has [WIP] in title — agent may be working. Skipping merge."
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
          elif [ "$FILES" = "0" ] || [ -z "$FILES" ]; then
            echo "PR has no file changes — agent may not have committed yet. Skipping merge."
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
          else
            echo "PR has $FILES changed files. Proceeding with merge."
            echo "should_merge=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge PR
        if: steps.author-check.outputs.is_copilot == 'true' && steps.change-check.outputs.should_merge == 'true'
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close linked issues
        if: steps.author-check.outputs.is_copilot == 'true' && steps.change-check.outputs.should_merge == 'true'
        run: |
          ISSUES=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[].number')
          for ISSUE in $ISSUES; do
            gh issue close "$ISSUE" \
              --comment "✅ Implemented and merged via PR #${{ github.event.pull_request.number }}." \
              --repo ${{ github.repository }}
            echo "Closed issue #$ISSUE"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
