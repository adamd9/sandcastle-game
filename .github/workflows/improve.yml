name: Game Improvement Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Find and assign approved issues
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          # On label event: only process if it's the approved-for-work label
          if [ "${{ github.event_name }}" = "issues" ] && [ "${{ github.event.label.name }}" != "approved-for-work" ]; then
            echo "Not an approved-for-work label event, skipping."
            exit 0
          fi

          # On schedule/dispatch: find all open approved-for-work issues not yet is-approved
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUES=$(gh issue list \
              --repo ${{ github.repository }} \
              --label "approved-for-work" \
              --state open \
              --json number \
              --jq '.[].number')
          else
            ISSUES="${{ github.event.issue.number }}"
          fi

          PROCESSED=0
          FAILED=0

          for ISSUE in $ISSUES; do
            LABELS=$(gh issue view "$ISSUE" --repo ${{ github.repository }} --json labels --jq '[.labels[].name]') || {
              echo "::warning::Failed to fetch labels for issue #$ISSUE, skipping."
              FAILED=$((FAILED + 1))
              continue
            }
            if echo "$LABELS" | grep -q "is-approved"; then
              echo "Issue #$ISSUE already is-approved, skipping."
              continue
            fi

            echo "Assigning issue #$ISSUE to copilot-swe-agent..."
            if gh issue edit "$ISSUE" \
              --add-assignee copilot-swe-agent \
              --repo ${{ github.repository }}; then
              echo "Assigned issue #$ISSUE successfully."
            else
              echo "::warning::Failed to assign issue #$ISSUE."
              FAILED=$((FAILED + 1))
              continue
            fi

            echo "Swapping labels on issue #$ISSUE..."
            gh issue edit "$ISSUE" \
              --add-label "is-approved" \
              --remove-label "approved-for-work" \
              --repo ${{ github.repository }} || echo "::warning::Failed to swap labels on issue #$ISSUE (assignment still succeeded)."

            PROCESSED=$((PROCESSED + 1))
          done

          echo "--- Summary ---"
          echo "Processed: $PROCESSED"
          echo "Failed: $FAILED"
