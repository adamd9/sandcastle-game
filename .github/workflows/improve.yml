name: Game Improvement Agent

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  trigger-agent:
    if: github.event.label.name == 'approved-for-work'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot coding agent to issue
        run: gh issue edit ${{ github.event.issue.number }} --add-assignee copilot-swe-agent --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
