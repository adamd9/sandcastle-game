name: Label Agent PRs

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  pull-requests: write

jobs:
  label-agent-pr:
    if: github.event.pull_request.user.login == 'copilot-swe-agent'
    runs-on: ubuntu-latest
    steps:
      - name: Add agent-pr label
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "agent-pr" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
