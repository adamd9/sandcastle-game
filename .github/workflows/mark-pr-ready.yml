name: Mark Copilot PRs ready for review

# Uses pull_request_target (not pull_request) so the workflow is NOT gated
# behind GitHub's "approval required" for bot actors. pull_request events
# from bot actors get conclusion=action_required with 0 jobs — the workflow
# never starts. pull_request_target bypasses this because it runs in the
# context of the base branch.
#
# SECURITY: This workflow intentionally does NOT check out PR code. It only
# calls `gh pr ready` via the GitHub API. No untrusted code is executed.

on:
  pull_request_target:
    types: [opened]
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Event-based: runs when a PR is opened (may be blocked by approval gate)
  mark-ready:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' && github.event.pull_request.draft == true
    steps:
      - name: Check PR author
        id: author-check
        run: |
          LOGIN="${{ github.event.pull_request.user.login }}"
          TYPE="${{ github.event.pull_request.user.type }}"
          echo "PR author login: '$LOGIN'"
          echo "PR author type: '$TYPE'"
          # Require Bot type AND specific Copilot login to prevent abuse
          # via pull_request_target (which doesn't require approval).
          if [[ "$TYPE" == "Bot" ]] && [[ "$LOGIN" == "Copilot" || "$LOGIN" == "copilot-swe-agent"* ]]; then
            echo "is_copilot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_copilot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark PR ready for review
        if: steps.author-check.outputs.is_copilot == 'true'
        # Use COPILOT_TOKEN (a PAT) so GitHub fires the ready_for_review
        # event as a real user actor. This re-triggers auto-merge.yml
        # (pull_request: ready_for_review) with triggering_actor=adamd9,
        # which bypasses the GitHub approval gate for bot actors.
        # GITHUB_TOKEN would NOT fire the event (GitHub prevents loops).
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qi "\[WIP\]"; then
            echo "PR still has [WIP] in title — agent is working. Skipping."
            exit 0
          fi
          echo "Marking PR #${{ github.event.pull_request.number }} as ready for review..."
          gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}

  # Scheduled fallback: finds draft Copilot PRs and marks them ready.
  # Runs on cron/dispatch to bypass the approval gate that blocks
  # pull_request_target for first-time bot contributors.
  mark-ready-scheduled:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Find and mark draft Copilot PRs ready
        run: |
          echo "Listing open draft PRs..."
          # Include title so we can skip [WIP] PRs where the agent is still working
          DRAFT_PRS=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --draft --json number,author,title --jq '.[]')

          if [ -z "$DRAFT_PRS" ]; then
            echo "No open draft PRs found."
            exit 0
          fi

          echo "$DRAFT_PRS" | while IFS= read -r pr; do
            [ -z "$pr" ] && continue
            NUMBER=$(echo "$pr" | jq -r '.number')
            AUTHOR=$(echo "$pr" | jq -r '.author.login')
            TITLE=$(echo "$pr" | jq -r '.title')
            echo "Checking PR #${NUMBER} by '${AUTHOR}': ${TITLE}"

            # Skip PRs where the agent is still working
            if echo "$TITLE" | grep -qi "\[WIP\]"; then
              echo "  → Skipping (still WIP — agent is working)."
              continue
            fi

            # Case-insensitive check for Copilot-related authors
            if echo "$AUTHOR" | grep -iq "opilot"; then
              echo "  → Copilot PR detected. Marking PR #${NUMBER} as ready for review..."
              gh pr ready "$NUMBER" --repo "$GITHUB_REPOSITORY"
            else
              echo "  → Skipping (not a Copilot PR)."
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
