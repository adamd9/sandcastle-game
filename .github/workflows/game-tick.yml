name: Game Tick

# NOTE: The schedule: cron trigger has been removed from this workflow.
# The game server now handles tick scheduling internally via node-cron
# (see api/lib/scheduler.js and the TICK_CRON / ENABLE_SCHEDULER env vars).
# This workflow is kept for manual dispatch only (testing / emergency triggers).

on:
  workflow_dispatch:       # Manual trigger only — schedule moved server-side

jobs:
  tick:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger game tick
        run: |
          curl -f -X POST "${{ secrets.API_BASE_URL }}/tick" \
            -H "X-Api-Key: ${{ secrets.TICK_ADMIN_KEY }}"
