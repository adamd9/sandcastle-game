name: Post-Review Improvement Trigger

on:
  workflow_run:
    workflows: ["Review Game Improvement Suggestions"]
    types: [completed]

permissions:
  actions: write

jobs:
  trigger-improve:
    runs-on: ubuntu-latest
    # Only run if the review workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Dispatch improve workflow
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          echo "Review workflow completed — dispatching improve.yml to process any approved issues..."
          gh workflow run improve.yml --repo ${{ github.repository }}
